name: Terraform Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  root-terraform:
    name: Root Terraform Format & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Show directory structure
        run: ls -R .

  modules-matrix:
    name: Multi-cloud module validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module_dir:
          - modules/aws
          - modules/azure
          - modules/gcp
          - modules/oci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Init (no backend) in ${{ matrix.module_dir }}
        run: terraform -chdir=${{ matrix.module_dir }} init -backend=false

      - name: Validate in ${{ matrix.module_dir }}
        run: terraform -chdir=${{ matrix.module_dir }} validate
