name: Infracost Cost Estimate (Presentation Mode)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  infracost:
    name: Infracost CI (runs only when API key exists)
    runs-on: ubuntu-latest

    # ✅ Skip entire job when no INFRACOST_API_KEY secret is set
    if: ${{ secrets.INFRACOST_API_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Infracost CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh

      - name: Cost Estimate (Presentation Mode)
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          echo "Infracost CI stub running."
          echo "To enable real cost estimates:"
          echo "1) Add INFRACOST_API_KEY to repo secrets."
          echo "2) Uncomment Infracost plan commands."
          
          # Example for future real use (kept commented so no errors)
          # infracost breakdown --path=. --format=json --out-file=infracost.json
