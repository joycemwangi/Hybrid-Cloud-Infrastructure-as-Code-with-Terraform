name: Infracost Cost Estimate (stub)

on:
  # Show it in Actions and allow manual runs
  workflow_dispatch:
  # (Optional) also on PRs – job will still be skipped if secret is missing
  pull_request:
    branches:
      - main

jobs:
  infracost:
    name: Infracost CI (runs only when API key is set)
    runs-on: ubuntu-latest

    # ✅ Important: this means the job only runs
    # if INFRACOST_API_KEY secret is defined and non-empty.
    if: ${{ secrets.INFRACOST_API_KEY != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Infracost CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh

      - name: Show planned cost estimate
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          echo "Infracost CI placeholder. To enable real cost estimates:"
          echo "1) Set INFRACOST_API_KEY in GitHub repo secrets."
          echo "2) Point infracost to your Terraform plan file."
          # Example command (commented out so it's clearly presentation-only)
          # infracost breakdown --path=. --format=json --out-file=infracost.json
